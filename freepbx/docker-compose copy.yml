services:
  freepbx:
    container_name: freepbx-app
    image: tiredofit/freepbx
    ports:
      - "80:80"
      - "5060:5060/udp"
      - "18000-18100:18000-18100/udp"
    volumes:
      - ./data:/data
      - ./logs:/var/log
      # Removed ./www mapping to avoid Windows permission errors
    environment:
      - DB_EMBEDDED=TRUE
      - DB_NAME=asterisk
      - DB_USER=asterisk
      - DB_PASS=asterisk
      - RTP_START=18000
      - RTP_FINISH=18100
    restart: always